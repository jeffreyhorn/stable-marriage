name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and dev dependencies
        run: python -m pip install -e .[dev]

      - name: Typecheck
        run: make typecheck

      - name: Lint
        run: make lint

      - name: Run tests with enforced coverage
        run: make coverage

      - name: Run packaging smoke checks
        run: make packaging-smoke
